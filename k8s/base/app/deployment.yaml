apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-booking
  namespace: event-booking
spec:
  replicas: 3
  selector:
    matchLabels:
      app: event-booking
  template:
    metadata:
      labels:
        app: event-booking
    spec:
      serviceAccountName: event-booking-runtime
      initContainers:
        - name: copy-app-code
          image: ghcr.io/lbdistrictscouts/eventbookingbackend:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - cp -a /var/www/html/. /workdir
          volumeMounts:
            - name: app-code
              mountPath: /workdir
      containers:
        - name: app
          image: ghcr.io/lbdistrictscouts/eventbookingbackend:latest
          imagePullPolicy: Always
          command:
            - php-fpm
            - -F
          envFrom:
            - configMapRef:
                name: event-booking-config
            - secretRef:
                name: event-booking-secrets
          ports:
            - containerPort: 9000
              name: fpm
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: app-code
              mountPath: /var/www/html
        - name: web
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: app-code
              mountPath: /var/www/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: event-booking-tls
              mountPath: /etc/nginx/tls
              readOnly: true
      volumes:
        - name: app-code
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: event-booking-nginx
        - name: event-booking-tls
          secret:
            secretName: event-booking-backend-tls
