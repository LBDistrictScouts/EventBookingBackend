apiVersion: batch/v1
kind: CronJob
metadata:
  name: send-event-reminders
  namespace: event-booking
spec:
  suspend: true
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: event-booking-deploy
  namespace: event-booking
spec:
  suspend: true
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: deploy
              env:
                - name: CREATE_TEST_SCHEMA
                  value: "true"
