apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: event-booking-test

resources:
  - ../../base
  - ../../operations

patches:
  - target:
      kind: Namespace
      name: event-booking
    patch: |-
      - op: replace
        path: /metadata/name
        value: event-booking-test
  - path: configmap.yaml
  - path: nginx-configmap.yaml
  - path: tls-certificate.yaml
  - path: onepassword-items.yaml
  - path: workload-scale.yaml
  - path: cronjobs.yaml
