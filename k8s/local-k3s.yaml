apiVersion: v1
kind: Namespace
metadata:
  name: event-booking
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: event-booking-config
  namespace: event-booking
data:
  APP_NAME: event-booking-backend
  DEBUG: "false"
  APP_ENCODING: UTF-8
  APP_DEFAULT_LOCALE: en_GB
  APP_DEFAULT_TIMEZONE: Europe/London
  AWS_REGION: eu-west-1
  DISTRICT_CORE_DATA_URL: https://district-core-data.jacobagtyler.com/
  SMTP_HOST: email-smtp.eu-west-1.amazonaws.com
  SMTP_PORT: "587"
  SMTP_TIMEOUT: "30"
  SMTP_TLS: "true"
  SMTP_LOG: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-booking-runtime
  namespace: event-booking
imagePullSecrets:
  - name: ghcr-pull-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: event-booking-nginx
  namespace: event-booking
data:
  default.conf: |
    server {
        listen 80;
        server_name event-backend.jacobagtyler.com;
        return 308 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name event-backend.jacobagtyler.com;

        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;

        root /var/www/html/webroot;
        index index.php index.html index.htm;

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: event-booking
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-booking
  namespace: event-booking
spec:
  replicas: 3
  selector:
    matchLabels:
      app: event-booking
  template:
    metadata:
      labels:
        app: event-booking
    spec:
      serviceAccountName: event-booking-runtime
      initContainers:
        - name: copy-app-code
          image: ghcr.io/lbdistrictscouts/eventbookingbackend:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - cp -a /var/www/html/. /workdir
          volumeMounts:
            - name: app-code
              mountPath: /workdir
      containers:
        - name: app
          image: ghcr.io/lbdistrictscouts/eventbookingbackend:latest
          imagePullPolicy: Always
          command:
            - php-fpm
            - -F
          envFrom:
            - configMapRef:
                name: event-booking-config
            - secretRef:
                name: event-booking-secrets
          ports:
            - containerPort: 9000
              name: fpm
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: app-code
              mountPath: /var/www/html
        - name: web
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: app-code
              mountPath: /var/www/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: event-booking-tls
              mountPath: /etc/nginx/tls
              readOnly: true
      volumes:
        - name: app-code
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: event-booking-nginx
        - name: event-booking-tls
          secret:
            secretName: event-booking-backend-tls
---
apiVersion: v1
kind: Service
metadata:
  name: event-booking-web
  namespace: event-booking
spec:
  type: LoadBalancer
  selector:
    app: event-booking
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: https
      port: 443
      targetPort: https
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: event-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      serviceAccountName: event-booking-runtime
      containers:
        - name: worker
          image: ghcr.io/lbdistrictscouts/eventbookingbackend:latest
          imagePullPolicy: Always
          command:
            - php
            - bin/cake.php
            - QueueWorker
          envFrom:
            - configMapRef:
                name: event-booking-config
            - secretRef:
                name: event-booking-secrets
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: send-event-reminders
  namespace: event-booking
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 5
      template:
        spec:
          serviceAccountName: event-booking-runtime
          restartPolicy: Never
          containers:
            - name: send-event-reminders
              image: ghcr.io/lbdistrictscouts/eventbookingbackend:latest
              imagePullPolicy: Always
              command:
                - php
                - bin/cake.php
                - send_event_reminders
              envFrom:
                - configMapRef:
                    name: event-booking-config
                - secretRef:
                    name: event-booking-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: event-booking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      serviceAccountName: event-booking-runtime
      containers:
        - name: db
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: event-booking-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: event-booking-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-booking-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: event-booking
spec:
  selector:
    app: db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: event-booking-backend-tls
    namespace: event-booking
spec:
    secretName: event-booking-backend-tls
    issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
    dnsNames:
        - event-backend.jacobagtyler.com
