name: CI-CD

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      release_environment:
        description: GitHub Environment used to gate manual releases
        required: false
        default: production
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: lbdistrictscouts/eventbookingbackend

jobs:
  testsuite:
    name: PHPUnit Test Suite
    runs-on: ubuntu-22.04
    env:
      SECURITY_SALT: ci-security-salt-for-tests-only-0123456789abcdef
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/event_booking?schema=data
      DATABASE_TEST_URL: postgres://postgres:postgres@127.0.0.1:5432/event_booking?schema=test
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_URL: https://sqs.eu-west-1.amazonaws.com/000000000000/greenway-queue
      AWS_SQS_QUEUE_NAME: greenway-queue
      COGNITO_DOMAIN: auth.example.test
      COGNITO_CLIENT_ID: test-client-id
      COGNITO_CLIENT_SECRET: test-client-secret
      COGNITO_USER_POOL_ID: eu-west-1_testpool
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: event_booking
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d event_booking"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4', '8.5']

    steps:
    - uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl, pdo_pgsql, pgsql, sqlite3, pdo_sqlite
        ini-values: zend.assertions=1
        coverage: none

    - name: Prepare AWS profile
      run: |
        mkdir -p "$HOME/.aws"
        cat <<'EOF' > "$HOME/.aws/credentials"
        [lbd]
        aws_access_key_id = testing
        aws_secret_access_key = testing
        EOF
        cat <<'EOF' > "$HOME/.aws/config"
        [profile lbd]
        region = eu-west-1
        output = json
        EOF

    - name: Prepare database schemas
      env:
        PGPASSWORD: postgres
      run: |
        until pg_isready -h 127.0.0.1 -U postgres -d event_booking; do
          sleep 1
        done
        psql -h 127.0.0.1 -U postgres -d event_booking -c 'CREATE SCHEMA IF NOT EXISTS data;'
        psql -h 127.0.0.1 -U postgres -d event_booking -c 'CREATE SCHEMA IF NOT EXISTS test;'

    - name: Composer install
      uses: ramsey/composer-install@v4

    - name: Composer post install
      run: composer run-script post-install-cmd --no-interaction

    - name: Run PHPUnit
      run: vendor/bin/phpunit tests

  coding-standard:
    name: Coding Standard & Static Analysis
    runs-on: ubuntu-22.04
    env:
      SECURITY_SALT: ci-security-salt-for-analysis-only-0123456789abcdef
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_URL: https://sqs.eu-west-1.amazonaws.com/000000000000/greenway-queue
      AWS_SQS_QUEUE_NAME: greenway-queue
      COGNITO_DOMAIN: auth.example.test
      COGNITO_CLIENT_ID: test-client-id
      COGNITO_CLIENT_SECRET: test-client-secret
      COGNITO_USER_POOL_ID: eu-west-1_testpool

    steps:
    - uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, intl, dom, simplexml, tokenizer, xml, xmlwriter
        coverage: none
        tools: cs2pr, phpstan:2.1.22

    - name: Composer install
      uses: ramsey/composer-install@v4

    - name: Prepare AWS profile
      run: |
        mkdir -p "$HOME/.aws"
        cat <<'EOF' > "$HOME/.aws/credentials"
        [lbd]
        aws_access_key_id = testing
        aws_secret_access_key = testing
        EOF
        cat <<'EOF' > "$HOME/.aws/config"
        [profile lbd]
        region = eu-west-1
        output = json
        EOF

    - name: Run PHP CodeSniffer
      run: vendor/bin/phpcs --report=checkstyle | cs2pr

    - name: Run phpstan
      if: always()
      run: composer stan

  docker-smoke-test:
    name: Smoke Test Docker Image
    needs:
      - testsuite
      - coding-standard
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build smoke-test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: event-booking:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify runtime dependencies exist
        run: |
          docker run --rm event-booking:smoke test -f /var/www/html/vendor/autoload.php
          docker run --rm event-booking:smoke test -f /var/www/html/bin/cake.php
          docker run --rm event-booking:smoke test -f /var/www/html/webroot/district_u_i/css/district-ui.css
          docker run --rm event-booking:smoke test -f /var/www/html/webroot/district_u_i/js/bootstrap.bundle.min.js
          docker run --rm event-booking:smoke test -f /var/www/html/webroot/district_u_i/assets/topography.svg
          docker run --rm event-booking:smoke php -r 'require "/var/www/html/vendor/autoload.php";'

  docker-build:
    name: Build Docker Image (${{ matrix.platform }})
    if: github.event_name == 'pull_request'
    needs: docker-smoke-test
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish:
    name: Publish Docker Image (${{ matrix.platform }})
    if: github.event_name != 'pull_request'
    needs: docker-smoke-test
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Publish Docker Manifest
    if: github.event_name != 'pull_request'
    needs: docker-publish
    runs-on: ubuntu-24.04
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.release_environment || 'production' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Publish release guidance
        run: |
          {
            echo "## Runtime Secrets"
            echo ""
            echo "This workflow only publishes the image."
            echo "Inject application secrets at container runtime via your deploy platform or docker compose."
            echo ""
            echo "Recommended GitHub Environment secrets for deployments:"
            echo "- SECURITY_SALT"
            echo "- DATABASE_URL"
            echo "- DATABASE_TEST_URL"
            echo "- POSTGRES_DB"
            echo "- POSTGRES_USER"
            echo "- POSTGRES_PASSWORD"
            echo "- AWS_REGION"
            echo "- AWS_ACCESS_KEY_ID"
            echo "- AWS_SECRET_ACCESS_KEY"
            echo "- AWS_SESSION_TOKEN"
            echo "- AWS_SQS_QUEUE_URL"
            echo "- AWS_SQS_QUEUE_NAME"
            echo "- COGNITO_DOMAIN"
            echo "- COGNITO_CLIENT_ID"
            echo "- COGNITO_CLIENT_SECRET"
            echo "- COGNITO_USER_POOL_ID"
            echo "- SMTP_HOST"
            echo "- SMTP_PORT"
            echo "- SMTP_TIMEOUT"
            echo "- SMTP_TLS"
            echo "- SMTP_LOG"
            echo "- SMTP_USERNAME"
            echo "- SMTP_PASSWORD"
            echo "- SMTP_CLIENT"
            echo "- EMAIL_TRANSPORT_SMTP_URL"
            echo "- GH_PACKAGE_AUTH (if @lbdistrictscouts/district-styles requires registry auth)"
          } >> "$GITHUB_STEP_SUMMARY"
