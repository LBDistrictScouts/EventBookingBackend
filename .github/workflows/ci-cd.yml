name: CI-CD

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      release_environment:
        description: GitHub Environment used to gate manual releases
        required: false
        default: production
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  testsuite:
    name: PHPUnit Test Suite
    runs-on: ubuntu-22.04
    env:
      SECURITY_SALT: ci-security-salt-for-tests-only-0123456789abcdef
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/event_booking?schema=data
      DATABASE_TEST_URL: postgres://postgres:postgres@127.0.0.1:5432/event_booking?schema=test
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_URL: https://sqs.eu-west-1.amazonaws.com/000000000000/greenway-queue
      AWS_SQS_QUEUE_NAME: greenway-queue
      COGNITO_DOMAIN: auth.example.test
      COGNITO_CLIENT_ID: test-client-id
      COGNITO_CLIENT_SECRET: test-client-secret
      COGNITO_USER_POOL_ID: eu-west-1_testpool
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: event_booking
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d event_booking"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4', '8.5']
        dependencies: ['highest']
        include:
          - php-version: '8.5'
            dependencies: 'lowest'

    steps:
    - uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl, pdo_pgsql, pgsql, sqlite3, pdo_sqlite
        ini-values: zend.assertions=1
        coverage: none

    - name: Prepare AWS profile
      run: |
        mkdir -p "$HOME/.aws"
        cat <<'EOF' > "$HOME/.aws/credentials"
        [lbd]
        aws_access_key_id = testing
        aws_secret_access_key = testing
        EOF
        cat <<'EOF' > "$HOME/.aws/config"
        [profile lbd]
        region = eu-west-1
        output = json
        EOF

    - name: Prepare database schemas
      env:
        PGPASSWORD: postgres
      run: |
        until pg_isready -h 127.0.0.1 -U postgres -d event_booking; do
          sleep 1
        done
        psql -h 127.0.0.1 -U postgres -d event_booking -c 'CREATE SCHEMA IF NOT EXISTS data;'
        psql -h 127.0.0.1 -U postgres -d event_booking -c 'CREATE SCHEMA IF NOT EXISTS test;'

    - name: Composer install
      uses: ramsey/composer-install@v3
      with:
        dependency-versions: ${{ matrix.dependencies }}

    - name: Composer post install
      run: composer run-script post-install-cmd --no-interaction

    - name: Run PHPUnit
      run: vendor/bin/phpunit tests

  coding-standard:
    name: Coding Standard & Static Analysis
    runs-on: ubuntu-22.04
    env:
      SECURITY_SALT: ci-security-salt-for-analysis-only-0123456789abcdef
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_URL: https://sqs.eu-west-1.amazonaws.com/000000000000/greenway-queue
      AWS_SQS_QUEUE_NAME: greenway-queue
      COGNITO_DOMAIN: auth.example.test
      COGNITO_CLIENT_ID: test-client-id
      COGNITO_CLIENT_SECRET: test-client-secret
      COGNITO_USER_POOL_ID: eu-west-1_testpool

    steps:
    - uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, intl, dom, simplexml, tokenizer, xml, xmlwriter
        coverage: none
        tools: cs2pr, phpstan:2.1.22

    - name: Composer install
      uses: ramsey/composer-install@v3

    - name: Prepare AWS profile
      run: |
        mkdir -p "$HOME/.aws"
        cat <<'EOF' > "$HOME/.aws/credentials"
        [lbd]
        aws_access_key_id = testing
        aws_secret_access_key = testing
        EOF
        cat <<'EOF' > "$HOME/.aws/config"
        [profile lbd]
        region = eu-west-1
        output = json
        EOF

    - name: Run PHP CodeSniffer
      run: vendor/bin/phpcs --report=checkstyle | cs2pr

    - name: Run phpstan
      if: always()
      run: composer stan

  docker-smoke-test:
    name: Smoke Test Docker Image
    needs:
      - testsuite
      - coding-standard
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up npm auth for GitHub Packages
        run: |
          {
            echo "@lbdistrictscouts:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
            echo "always-auth=true"
          } > .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGE_AUTH }}

      - name: Build theme assets
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGE_AUTH }}
          THEME_SOURCE_PATH: ""
        run: sh bin/build-theme-assets.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: event-booking:smoke
          cache-from: type=gha

      - name: Verify runtime dependencies exist
        run: |
          docker run --rm event-booking:smoke test -f /var/www/html/vendor/autoload.php
          docker run --rm event-booking:smoke test -f /var/www/html/bin/cake.php
          docker run --rm event-booking:smoke test -f /var/www/html/webroot/theme/theme.css
          docker run --rm event-booking:smoke php -r 'require "/var/www/html/vendor/autoload.php";'

  docker-build:
    name: Build Docker Image
    if: github.event_name == 'pull_request'
    needs: docker-smoke-test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up npm auth for GitHub Packages
        run: |
          {
            echo "@lbdistrictscouts:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
            echo "always-auth=true"
          } > .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGE_AUTH }}

      - name: Build theme assets
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGE_AUTH }}
          THEME_SOURCE_PATH: ""
        run: sh bin/build-theme-assets.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish:
    name: Publish Docker Image
    if: github.event_name != 'pull_request'
    needs: docker-smoke-test
    runs-on: ubuntu-24.04
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.release_environment || 'production' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up npm auth for GitHub Packages
        run: |
          {
            echo "@lbdistrictscouts:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
            echo "always-auth=true"
          } > .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGE_AUTH }}

      - name: Build theme assets
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGE_AUTH }}
          THEME_SOURCE_PATH: ""
        run: sh bin/build-theme-assets.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish release guidance
        run: |
          {
            echo "## Runtime Secrets"
            echo ""
            echo "This workflow only publishes the image."
            echo "Inject application secrets at container runtime via your deploy platform or docker compose."
            echo ""
            echo "Recommended GitHub Environment secrets for deployments:"
            echo "- SECURITY_SALT"
            echo "- DATABASE_URL"
            echo "- DATABASE_TEST_URL"
            echo "- POSTGRES_DB"
            echo "- POSTGRES_USER"
            echo "- POSTGRES_PASSWORD"
            echo "- AWS_REGION"
            echo "- AWS_ACCESS_KEY_ID"
            echo "- AWS_SECRET_ACCESS_KEY"
            echo "- AWS_SESSION_TOKEN"
            echo "- AWS_SQS_QUEUE_URL"
            echo "- AWS_SQS_QUEUE_NAME"
            echo "- COGNITO_DOMAIN"
            echo "- COGNITO_CLIENT_ID"
            echo "- COGNITO_CLIENT_SECRET"
            echo "- COGNITO_USER_POOL_ID"
            echo "- SMTP_HOST"
            echo "- SMTP_PORT"
            echo "- SMTP_TIMEOUT"
            echo "- SMTP_TLS"
            echo "- SMTP_LOG"
            echo "- SMTP_USERNAME"
            echo "- SMTP_PASSWORD"
            echo "- SMTP_CLIENT"
            echo "- EMAIL_TRANSPORT_SMTP_URL"
            echo "- GH_PACKAGE_AUTH (if @lbdistrictscouts/district-styles requires registry auth)"
          } >> "$GITHUB_STEP_SUMMARY"
